<div class="type-panel">
  <div class="type-panel__header">
    <span
      class="type-panel__step"
      [class.type-panel__step--active]="store.universeId()"
    >02</span>
    <span
      class="type-panel__title"
      [class.type-panel__title--active]="store.universeId()"
    >Type</span>
    @if (store.selectedType(); as type) {
      <span class="type-panel__chosen" aria-live="polite">{{ type.title }}</span>
    }
  </div>

  <div class="type-panel__scroll">
    @if (!store.universeId()) {
      <div class="type-panel__locked" aria-live="polite">
        <span class="type-panel__locked-icon" aria-hidden="true">◈</span>
        <span>select a universe</span>
      </div>
    } @else {
      @for (type of store.availableTypes(); track type.id) {
        <button
          class="type-card"
          [class.type-card--selected]="store.typeId() === type.id"
          [attr.aria-pressed]="store.typeId() === type.id"
          (click)="store.selectType(type.id)"
        >
          <div class="type-card__thumb" aria-hidden="true">
            @if (type.imageUrl && !imgErrors().has(type.id)) {
              <img class="type-card__img" [src]="type.imageUrl" [alt]="type.title" (error)="onImgError(type.id)" />
            } @else {
              <div class="ph">
                <span class="ph__label">{{ type.title.split(' ')[0] }}</span>
              </div>
            }
          </div>
          <div class="type-card__info">
            <div class="type-card__name">{{ type.title }}</div>
            <div class="type-card__subtitle">{{ type.subtitle }}</div>
          </div>
          <span class="type-card__arrow" aria-hidden="true">›</span>
        </button>
      }
    }
  </div>
</div>
